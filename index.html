<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock-paper-scissors game</title>
    <!-- Relative path: no leading slash, and matched to 'style.css' (lowercase, no extra 's') -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="information">
        <h2 class="information_title">Score</h2>
        <p id="Computer">Computer: <span id="computerWinCount">0</span></p>
        <p id="You">You: <span id="playerWinCount">0</span></p>
    </div>
    
    <h1 class="title">Rock paper scissors game</h1>
    
    <div class="options_container">
        <!-- Kept relative image paths and gave each button a unique ID -->
        <button class="button" id="rock_btn" value="rock" onclick="program()">
            <img src="rock.png" class="button_icon"><br>Rock
        </button>
        <button class="button" id="paper_btn" value="paper" onclick="program()">
            <img src="paper.png" class="button_icon"><br>Paper
        </button>
        <button class="button" id="scissors_btn" value="scissors" onclick="program()">
            <img src="scissors.png" class="button_icon"><br>Scissors
        </button>
    </div>

    <div class="result_container">
        <h1 id="result"></h1>
        <h1 id="computer_choice"></h1>
        <h1 id="player_choice"></h1>
    </div>

    <script>
        function program() {
            // Identifies which button was clicked using its value attribute
            let choice = document.activeElement.value;
            let computer_result;
            
            function math() {
                const mathResult = Math.random() * 10;
                computer_result = -1;
                
                if (mathResult <= 3.333333333) {
                    computer_result = "rock";
                } else if (mathResult > 3.33333333 && mathResult <= 6.6666666666) {
                    computer_result = "paper";
                } else {
                    computer_result = "scissors";
                }
                console.log(mathResult);
            }
            math();
            
            function run_result() {
                // Check game rules and update the UI text results
                if (choice === computer_result) {
                    document.getElementById("result").textContent = "DRAW";
                    document.getElementById("result").style.backgroundColor = "black";

                } else if (
                    (choice === "paper" && computer_result === "rock") || 
                    (choice === "rock" && computer_result === "scissors") || 
                    (choice === "scissors" && computer_result === "paper")
                ) {
                    document.getElementById("result").textContent = "YOU WIN";
                    document.getElementById("result").style.backgroundColor = "green";
                    document.getElementById("playerWinCount").textContent = parseInt(document.getElementById("playerWinCount").textContent) + 1;
                } else if (
                    (choice === "rock" && computer_result === "paper") || 
                    (choice === "scissors" && computer_result === "rock") || 
                    (choice === "paper" && computer_result === "scissors")
                ) {
                    document.getElementById("result").textContent = "YOU LOST";
                    document.getElementById("result").style.backgroundColor = "red";
                    document.getElementById("computerWinCount").textContent = parseInt(document.getElementById("computerWinCount").textContent) + 1;
                }

                document.getElementById("computer_choice").textContent = "Computer choice: " + computer_result;
                document.getElementById("player_choice").textContent = "Player choice: " + choice;
            }

            run_result();
        }
    </script>
</body>
</html>
